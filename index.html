<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VK Meow Messenger</title>
    
    <!-- CryptoJS для базового AES-шифрования -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

    <!-- Инициализация Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, get, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
          apiKey: "AIzaSyDQMqwnJp34H6I7ragLr14LQ4YszpDFYbg",
          authDomain: "meowmessenger.firebaseapp.com",
          databaseURL: "https://meowmessenger-default-rtdb.europe-west1.firebasedatabase.app",
          projectId: "meowmessenger",
          storageBucket: "meowmessenger.firebasestorage.app",
          messagingSenderId: "906512822162",
          appId: "1:906512822162:web:a868af851cec5a3381db4b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        window.fb = { db, auth, ref, set, push, onValue, get, update, remove, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut };
    </script>

    <style>
        :root {
            --bg-dark: #000000;         /* AMOLED черный */
            --bg-bar: #0A0A0C;          /* Глубокий темный для баров */
            --msg-out: #1F80E0;         /* Синий исходящий */
            --msg-in: #1C1C1E;          /* Темно-серый входящий */
            --accent: #1F80E0;
            --second: #161618;
            --text-muted: #8E8E93;
            --text-white: #F2F2F7;
            --online: #34C759;
            --error: #FF3B30;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-white);
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ШАПКА */
        .header-bar {
            height: 60px;
            background-color: var(--bg-bar);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            border-bottom: 1px solid #161618;
            z-index: 100;
        }

        .header-title {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .header-buttons {
            display: flex;
            gap: 8px;
        }

        .header-btn {
            background: none;
            border: none;
            color: white;
            font-size: 22px;
            width: 40px;
            height: 40px;
            cursor: pointer;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .header-btn:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        /* КОНТЕНТ */
        .main-container {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .tab-panel {
            width: 100%;
            height: 100%;
            display: none;
            overflow-y: auto;
        }

        .tab-panel.active {
            display: block;
        }

        /* НИЖНИЙ НАВИГАТОР */
        .bottom-bar {
            height: 60px;
            background-color: var(--bg-bar);
            display: flex;
            border-top: 1px solid #161618;
            z-index: 100;
        }

        .tab-button {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-muted);
            transition: color 0.2s;
        }

        .tab-button.active {
            color: var(--accent);
        }

        .tab-icon {
            font-size: 20px;
            margin-bottom: 2px;
        }

        .tab-label {
            font-size: 10px;
            font-weight: 600;
        }

        /* ПОИСК */
        .search-row {
            margin: 12px 16px;
            display: flex;
            gap: 10px;
        }

        .search-bar {
            flex: 1;
            height: 44px;
            border-radius: 12px;
            border: 1px solid #2C2C2E;
            background: #1C1C1E;
            color: white;
            padding: 0 16px;
            outline: none;
            font-size: 15px;
        }

        .search-action-btn {
            height: 44px;
            padding: 0 16px;
            border-radius: 12px;
            background: var(--accent);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        /* СПИСОК ЧАТОВ */
        .chat-row {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 1px solid #0A0A0C;
            transition: background 0.2s;
        }

        .chat-row:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .chat-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            color: white;
            position: relative;
            flex-shrink: 0;
        }

        .online-dot {
            width: 14px;
            height: 14px;
            background: var(--online);
            border-radius: 50%;
            position: absolute;
            bottom: 0;
            right: 0;
            border: 3px solid var(--bg-dark);
            display: none;
        }

        .chat-info {
            flex: 1;
            margin-left: 14px;
            overflow: hidden;
        }

        .chat-name-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .chat-row-name {
            font-weight: 700;
            font-size: 16px;
            color: var(--text-white);
        }

        .chat-row-time {
            font-size: 12px;
            color: var(--text-muted);
        }

        .chat-row-msg {
            font-size: 14px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .delete-chat-btn {
            background: none;
            border: none;
            color: var(--error);
            font-size: 18px;
            padding: 8px;
            cursor: pointer;
            margin-left: 8px;
        }

        /* ОКНО ЧАТА */
        .chat-window {
            position: fixed;
            inset: 0;
            background-color: var(--bg-dark);
            z-index: 1000;
            display: none;
            flex-direction: column;
        }

        .chat-window.active {
            display: flex;
        }

        .chat-header {
            height: 60px;
            background-color: var(--bg-bar);
            display: flex;
            align-items: center;
            padding: 0 16px;
            border-bottom: 1px solid #161618;
        }

        .chat-header-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin-left: 8px;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .chat-header-info {
            flex: 1;
            margin-left: 12px;
        }

        .chat-header-title {
            font-size: 16px;
            font-weight: 700;
        }

        .chat-header-status {
            font-size: 12px;
            color: var(--text-muted);
        }

        .chat-feed {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* СООБЩЕНИЯ */
        .msg-container {
            display: flex;
            flex-direction: column;
            max-width: 75%;
        }

        .msg-container.out {
            align-self: flex-end;
        }

        .msg-container.in {
            align-self: flex-start;
        }

        .msg-bubble {
            padding: 10px 14px;
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .msg-container.out .msg-bubble {
            background-color: var(--msg-out);
            border-radius: 16px 16px 4px 16px;
            color: white;
        }

        .msg-container.in .msg-bubble {
            background-color: var(--msg-in);
            border-radius: 16px 16px 16px 4px;
            color: white;
        }

        .msg-meta {
            display: flex;
            justify-content: flex-end;
            padding: 4px 4px 0 4px;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.4);
        }

        /* ПАНЕЛЬ ВВОДА */
        .chat-input-bar {
            padding: 10px;
            background-color: var(--bg-bar);
            display: flex;
            align-items: center;
            gap: 8px;
            border-top: 1px solid #161618;
        }

        .message-input {
            flex: 1;
            height: 44px;
            border-radius: 22px;
            background: #1C1C1E;
            border: none;
            outline: none;
            color: white;
            padding: 12px 18px;
            font-size: 15px;
            resize: none;
        }

        /* ЭКРАН ВХОДА */
        #login-screen {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .login-card {
            width: 90%;
            max-width: 380px;
            background: #161618;
            padding: 32px 24px;
            border-radius: 24px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* МОДАЛКИ */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1500;
            backdrop-filter: blur(8px);
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-card {
            background: #161618;
            border-radius: 20px;
            width: 90%;
            max-width: 380px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* НАСТРОЙКИ ПРОФИЛЯ */
        .profile-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 15px;
        }

        /* НОВОСТИ */
        .post-card {
            background: #161618;
            border-radius: 16px;
            padding: 14px;
            margin: 12px 16px;
            border: 1px solid rgba(255,255,255,0.02);
        }

        .post-header {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }

        .post-author-av {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-size: cover;
        }

        .post-author-info {
            margin-left: 10px;
        }

        /* МЕДИА */
        .msg-media {
            width: 200px;
            height: 150px;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            margin-bottom: 4px;
        }

        .msg-media img, .msg-media video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <!-- ЭКРАН ВХОДА -->
    <div id="login-screen">
        <div class="login-card">
            <div style="font-size: 50px; margin-bottom: 10px;">🐾</div>
            <h1 style="font-size: 24px; margin-bottom: 6px;">VK Meow</h1>
            <p style="color: var(--text-muted); font-size: 13px; margin-bottom: 24px;">Безопасный мессенджер нового поколения</p>
            
            <input type="email" id="login-email" class="search-bar" style="margin-bottom: 12px; width:100%;" placeholder="Электронная почта">
            <input type="password" id="login-password" class="search-bar" style="margin-bottom: 20px; width:100%;" placeholder="Пароль">
            
            <button class="search-action-btn" onclick="authAction()" style="width: 100%; justify-content: center; height: 48px;">Войти / Создать аккаунт</button>
            <div id="auth-error" style="color: var(--error); margin-top: 15px; font-size: 13px; display: none;"></div>
        </div>
    </div>

    <!-- ШАПКА -->
    <div class="header-bar" id="app-header">
        <div class="header-title" id="header-main-title">VK Meow</div>
        <div class="header-buttons">
            <button class="header-btn" title="Избранное (Облако)" onclick="openCloudChat()">☁️</button>
            <button class="header-btn" title="Выйти" onclick="logoutAction()">🚪</button>
        </div>
    </div>

    <!-- ОСНОВНОЙ КОНТЕНТ -->
    <div class="main-container">
        
        <!-- Вкладка 0: Диалоги -->
        <div class="tab-panel active" id="tab-0">
            <div class="search-row">
                <input type="text" id="chat-search" class="search-bar" placeholder="Поиск по диалогам..." oninput="filterDialogs(this.value)">
                <button class="search-action-btn" onclick="openModal('search-people-modal')">➕ Найти</button>
            </div>
            <div class="chats-list" id="chats-list-container"></div>
        </div>

        <!-- Вкладка 1: Новости -->
        <div class="tab-panel" id="tab-1">
            <div id="news-container"></div>
        </div>

        <!-- Вкладка 2: Настройки профиля -->
        <div class="tab-panel" id="tab-2" style="padding: 20px 16px;">
            <h2 style="font-size: 22px; font-weight: 800; margin-bottom: 4px;">Настройки профиля</h2>
            <p style="color: var(--text-muted); font-size: 13px; margin-bottom: 20px;">Ваша почта полностью скрыта и защищена от посторонних глаз</p>
            
            <!-- Круглый выбор фото профиля в настройки -->
            <div style="display: flex; flex-direction: column; align-items: center; margin-bottom: 20px;">
                <div class="chat-avatar" id="my-profile-avatar" style="width: 80px; height: 80px; font-size: 24px; cursor: pointer; background-color: var(--accent);" onclick="document.getElementById('profile-avatar-upload').click()">?</div>
                <input type="file" id="profile-avatar-upload" style="display: none;" accept="image/*" onchange="compressAndSetProfileAvatar(this.files[0])">
                <span style="font-size: 12px; color: var(--accent); cursor: pointer; margin-top: 8px;" onclick="document.getElementById('profile-avatar-upload').click()">Изменить фото</span>
            </div>

            <div class="profile-form">
                <label style="font-size: 12px; font-weight: bold; color: var(--text-muted);">ИМЯ</label>
                <input type="text" id="setting-name" class="search-bar" placeholder="Введите имя">

                <label style="font-size: 12px; font-weight: bold; color: var(--text-muted);">ФАМИЛИЯ (НЕОБЯЗАТЕЛЬНО)</label>
                <input type="text" id="setting-lastname" class="search-bar" placeholder="Введите фамилию">

                <label style="font-size: 12px; font-weight: bold; color: var(--text-muted);">ВАШ УНИКАЛЬНЫЙ НИКНЕЙМ (@)</label>
                <input type="text" id="setting-username" class="search-bar" placeholder="username">

                <button class="search-action-btn" style="width: 100%; margin-top: 10px; height: 48px; justify-content: center;" onclick="saveProfileSettings()">💾 Сохранить изменения</button>
            </div>
        </div>

    </div>

    <!-- НИЖНИЙ НАВИГАТОР -->
    <div class="bottom-bar" id="app-bottom-bar">
        <div class="tab-button active" onclick="switchTab(0)">
            <div class="tab-icon">💬</div>
            <div class="tab-label">Чаты</div>
        </div>
        <div class="tab-button" onclick="switchTab(1)">
            <div class="tab-icon">📰</div>
            <div class="tab-label">Новости</div>
        </div>
        <div class="tab-button" onclick="switchTab(2)">
            <div class="tab-icon">⚙️</div>
            <div class="tab-label">Профиль</div>
        </div>
    </div>

    <!-- ОКНО ЧАТА -->
    <div class="chat-window" id="chat-window">
        <div class="chat-header">
            <button class="header-btn" onclick="closeChat()">⬅</button>
            <div class="chat-header-avatar" id="chat-header-av">?</div>
            <div class="chat-header-info">
                <div class="chat-header-title" id="chat-header-title">Загрузка...</div>
                <div class="chat-header-status" id="chat-header-status">офлайн</div>
            </div>
        </div>
        
        <div class="chat-feed" id="chat-feed"></div>

        <div class="chat-input-bar">
            <input type="file" id="media-upload" style="display: none;" accept="image/*,video/*" onchange="compressAndSendMedia(this.files[0])">
            <button class="header-btn" style="color: var(--accent)" id="clip-btn" onclick="document.getElementById('media-upload').click()">📎</button>

            <textarea class="message-input" id="message-input" placeholder="Сообщение..." rows="1"></textarea>

            <button class="header-btn" style="color: var(--accent)" id="send-btn" onclick="handleSendClick()">➤</button>
        </div>
    </div>

    <!-- МОДАЛКА ПОИСКА ПОЛЬЗОВАТЕЛЕЙ -->
    <div class="modal-overlay" id="search-people-modal">
        <div class="modal-card">
            <h3 style="margin-bottom: 10px; text-align: center;">👤 Найти собеседника</h3>
            <p style="font-size: 12px; color: var(--text-muted); text-align: center; margin-bottom: 15px;">Введите никнейм без знака @</p>
            <input type="text" id="search-by-username" class="search-bar" style="width: 100%; margin-bottom: 15px;" placeholder="username">
            <button class="search-action-btn" style="width: 100%; justify-content: center; margin-bottom: 8px;" onclick="searchPeople()">Начать диалог</button>
            <button class="search-action-btn" style="width: 100%; justify-content: center; background: #2C2C2E;" onclick="closeModal('search-people-modal')">Отмена</button>
        </div>
    </div>

    <!-- МОДАЛКА ПРОСМОТРА КАРТИНОК И ВИДЕО -->
    <div class="modal-overlay" id="media-viewer-modal" style="background: black;">
        <span style="position: absolute; top: 20px; left: 20px; font-size: 30px; cursor: pointer; z-index: 10;" onclick="closeMediaViewer()">✕</span>
        <div id="media-viewer-content" style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;"></div>
    </div>

    <!-- ЛОГИКА ПРИЛОЖЕНИЯ -->
    <script>
        const TG_AVATAR_COLORS = ["#E17076", "#FAA774", "#A695E7", "#34C759", "#6EC9CB", "#1F80E0"];
        const BASE_AES_KEY = "12345678901234567890123456789012";

        let myUid = null;
        let myEmail = null;
        let myNameCombined = "";
        let currentPeer = null; 
        let currentRoomId = null;
        let tempProfileAvatarBase64 = ""; // Временный контейнер фото профиля

        // Сборщики слушателей для предотвращения зависаний
        let unsubDialogs = null;
        let unsubChatMessages = null;
        let unsubHeaderPresence = null;
        let activePresenceListeners = {};
        let activeLastMsgListeners = {};

        // --- КРИПТОГРАФИЯ (AES-256) ---
        function aesEncrypt(text, keyString) {
            const key = CryptoJS.enc.Utf8.parse(keyString.padEnd(32, '0').slice(0, 32));
            const iv = CryptoJS.lib.WordArray.random(16);
            const encrypted = CryptoJS.AES.encrypt(text, key, { iv: iv });
            return iv.toString() + encrypted.toString();
        }

        function aesDecrypt(cipherWithIv, keyString) {
            try {
                const key = CryptoJS.enc.Utf8.parse(keyString.padEnd(32, '0').slice(0, 32));
                const iv = CryptoJS.enc.Hex.parse(cipherWithIv.slice(0, 32));
                const cipher = cipherWithIv.slice(32);
                const decrypted = CryptoJS.AES.decrypt(cipher, key, { iv: iv });
                return decrypted.toString(CryptoJS.enc.Utf8);
            } catch (e) {
                return "[Ошибка расшифровки]";
            }
        }

        // --- АВТОРИЗАЦИЯ ---
        setTimeout(() => {
            window.fb.onAuthStateChanged(window.fb.auth, async (user) => {
                if (user) {
                    myUid = user.uid;
                    myEmail = user.email;
                    document.getElementById('login-screen').style.display = 'none';
                    
                    updatePresence("online");

                    // Подгружаем профиль
                    const profSnap = await window.fb.get(window.fb.ref(window.fb.db, `users/${myUid}/profile`));
                    if (profSnap.exists()) {
                        const prof = profSnap.val();
                        document.getElementById('setting-name').value = prof.name || "";
                        document.getElementById('setting-lastname').value = prof.lastname || "";
                        document.getElementById('setting-username').value = prof.username ? prof.username : "";
                        myNameCombined = (prof.name || "Без имени") + (prof.lastname ? " " + prof.lastname : "");
                        
                        tempProfileAvatarBase64 = prof.avatar || "";
                        const myAvEl = document.getElementById('my-profile-avatar');
                        if (tempProfileAvatarBase64) {
                            myAvEl.style.backgroundImage = `url(${tempProfileAvatarBase64})`;
                            myAvEl.innerText = "";
                        } else {
                            myAvEl.style.backgroundImage = "none";
                            myAvEl.innerText = myNameCombined[0].toUpperCase();
                        }
                    } else {
                        const fallbackNick = "id_" + Math.floor(1000 + Math.random() * 9000);
                        myNameCombined = user.email.split('@')[0];
                        await window.fb.set(window.fb.ref(window.fb.db, `users/${myUid}/profile`), {
                            name: myNameCombined,
                            lastname: "",
                            username: fallbackNick,
                            avatar: ""
                        });
                        await window.fb.set(window.fb.ref(window.fb.db, `usernames/${fallbackNick}`), myUid);
                    }

                    seedDatabaseIfNeeded();
                    switchTab(0);
                } else {
                    document.getElementById('login-screen').style.display = 'flex';
                }
            });
        }, 1200);

        async function authAction() {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value.trim();
            const errDiv = document.getElementById('auth-error');

            if (!email || !password) return;

            try {
                await window.fb.signInWithEmailAndPassword(window.fb.auth, email, password);
            } catch (err) {
                try {

                } catch (regErr) {
                    errDiv.innerText = regErr.message;
                    errDiv.style.display = 'block';
                }
            }
        }

        // --- ВКЛАДКИ НАВИГАЦИИ ---
        function switchTab(index) {
            document.querySelectorAll('.tab-panel').forEach((el, idx) => {
                el.classList.toggle('active', idx === index);
            });
            document.querySelectorAll('.tab-button').forEach((el, idx) => {

        // --- СЖАТИЕ ФОТО ДЛЯ СВОЕГО ПРОФИЛЯ ---
        async function compressAndSetProfileAvatar(file) {
            if (!file) return;
            const canvas = document.createElement('canvas');
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    // Аватарка 120x120 и качество 0.5 гарантирует размер до 3 КБ!
                    canvas.width = 120;
                    canvas.height = 120;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, 120, 120);
                    tempProfileAvatarBase64 = canvas.toDataURL('image/jpeg', 0.5);
                    
                    const myAvEl = document.getElementById('my-profile-avatar');
                    myAvEl.style.backgroundImage = `url(${tempProfileAvatarBase64})`;
                    myAvEl.innerText = "";
                };
            };
        }

        // --- СОХРАНЕНИЕ ПРОФИЛЯ ---
        async function saveProfileSettings() {
            const name = document.getElementById('setting-name').value.trim();
            const lastname = document.getElementById('setting-lastname').value.trim();
            let username = document.getElementById('setting-username').value.trim().replace('@', '').toLowerCase();

            if (!name || !username) {
                alert("Имя и никнейм обязательны!");
                return;
            }

            const nameCheck = await window.fb.get(window.fb.ref(window.fb.db, `usernames/${username}`));
            if (nameCheck.exists() && nameCheck.val() !== myUid) {
                alert("Данный никнейм уже занят!");
                return;
            }

            const profSnap = await window.fb.get(window.fb.ref(window.fb.db, `users/${myUid}/profile`));
            if (profSnap.exists() && profSnap.val().username !== username) {
                await window.fb.remove(window.fb.ref(window.fb.db, `usernames/${profSnap.val().username}`));
            }

            // Запись в базу ОДИН раз — моментально обновится у всех друзей
            await window.fb.update(window.fb.ref(window.fb.db, `users/${myUid}/profile`), {
                name: name,
                lastname: lastname,
                username: username,
                avatar: tempProfileAvatarBase64
            });
            await window.fb.set(window.fb.ref(window.fb.db, `usernames/${username}`), myUid);

            myNameCombined = name + (lastname ? " " + lastname : "");
            alert("Настройки успешно сохранены!");
            switchTab(0);
        }

        // --- СПИСОК ДИАЛОГОВ (РЕАКТИВНЫЙ И ЧИСТЫЙ) ---
        function loadDialogs() {
            if (unsubDialogs) unsubDialogs();
            Object.values(activePresenceListeners).forEach(un => un());
            Object.values(activeLastMsgListeners).forEach(un => un());
            activePresenceListeners = {};
            activeLastMsgListeners = {};

            const container = document.getElementById('chats-list-container');
            container.innerHTML = "";

            unsubDialogs = window.fb.onValue(window.fb.ref(window.fb.db, `users/${myUid}/chats`), (snap) => {
                container.innerHTML = "";
                if (!snap.exists()) {
                    container.innerHTML = `<div style="text-align:center; color: var(--text-muted); margin-top:40px; font-size:14px;">Список диалогов пуст. Найдите собеседника по нику!</div>`;
                    return;
                }
                const chatsObj = snap.val();

                Object.entries(chatsObj).forEach(([peerId, chatMeta]) => {
                    if (!chatMeta || !chatMeta.roomId) return;

                    const isCloud = (peerId === myUid);
                    const row = document.createElement('div');
                    row.className = "chat-row";
                    row.id = `chat-row-${peerId}`;

                    row.onclick = () => openChatWindow(peerId, chatMeta.roomId);

                    let colorIndex = Math.abs(peerId.charCodeAt(0)) % TG_AVATAR_COLORS.length;

                    row.innerHTML = `
                        <div class="chat-avatar" id="avatar-${peerId}" style="background-color: ${TG_AVATAR_COLORS[colorIndex]}">
                            ?
                            <div class="online-dot" id="dot-${peerId}"></div>
                        </div>
                        <div class="chat-info">
                            <div class="chat-name-row">
                                <div class="chat-row-name" id="name-${peerId}">Загрузка...</div>
                                <div class="chat-row-time" id="time-${peerId}"></div>
                            </div>
                            <div class="chat-row-msg" id="last-msg-${peerId}">Загрузка сообщений...</div>
                        </div>
                        <button class="delete-chat-btn" onclick="deleteDialog(event, '${peerId}')" title="Удалить">🗑️</button>
                    `;
                    container.appendChild(row);

                    if (isCloud) {
                        const nameEl = document.getElementById(`name-${peerId}`);
                        const avEl = document.getElementById(`avatar-${peerId}`);
                        const timeEl = document.getElementById(`time-${peerId}`);
                        if (nameEl) nameEl.innerText = "Избранное (Облако)";
                        if (avEl) {
                            avEl.style.backgroundImage = "none";
                            avEl.style.backgroundColor = "var(--accent)";
                            avEl.innerText = "☁️";
                        }
                        if (timeEl) timeEl.innerText = "облако";
                    } else {
                        // ЖИВОЙ СЛУШАТЕЛЬ ПРОФИЛЯ — МОМЕНТАЛЬНО ПРИМЕНЯЕТ ИЗМЕНЕНИЯ ИМЕНИ И ФОТО
                        activePresenceListeners[peerId + "_profile"] = window.fb.onValue(window.fb.ref(window.fb.db, `users/${peerId}/profile`), (profSnap) => {
                            const nameEl = document.getElementById(`name-${peerId}`);
                            const avEl = document.getElementById(`avatar-${peerId}`);
                            if (profSnap.exists()) {
                                const prof = profSnap.val();
                                const freshName = (prof.name || "Без имени") + (prof.lastname ? " " + prof.lastname : "");
                                if (nameEl) nameEl.innerText = freshName;
                                
                                if (avEl) {
                                    if (prof.avatar) {
                                        avEl.style.backgroundImage = `url(${prof.avatar})`;
                                        avEl.innerText = "";
                                        avEl.style.backgroundColor = "transparent";
                                    } else {
                                        avEl.style.backgroundImage = "none";
                                        avEl.style.backgroundColor = TG_AVATAR_COLORS[colorIndex];
                                        avEl.innerText = freshName[0].toUpperCase();
                                    }
                                }
                            }
                        });

                        // Живой статус
                        activePresenceListeners[peerId + "_presence"] = window.fb.onValue(window.fb.ref(window.fb.db, `users/${peerId}/presence`), (pSnap) => {
                            const dot = document.getElementById(`dot-${peerId}`);
                            const timeText = document.getElementById(`time-${peerId}`);
                            if (pSnap.exists() && dot && timeText) {
                                const p = pSnap.val();
                                if (p.status === "online") {
                                    dot.style.display = "block";
                                    timeText.innerText = "в сети";
                                    timeText.style.color = "var(--online)";
                                } else {
                                    dot.style.display = "none";
                                    timeText.innerText = formatTimeDiff(p.lastSeen);
                                    timeText.style.color = "var(--text-muted)";
                                }
                            }
                        });
                    }

                    // Живой слушатель последнего сообщения
                    activeLastMsgListeners[peerId] = window.fb.onValue(window.fb.ref(window.fb.db, `messages/${chatMeta.roomId}/list`), (mSnap) => {
                        const msgBox = document.getElementById(`last-msg-${peerId}`);
                        if (mSnap.exists() && msgBox) {
                            const list = Object.values(mSnap.val());
                            const lastMsg = list[list.length - 1];
                            let raw = lastMsg.text || "";
                            if (raw.startsWith("[MEOW]")) {
                                raw = aesDecrypt(raw.substring(6), BASE_AES_KEY);
                            }
                            try {
                                const parsed = JSON.parse(raw);
                                msgBox.innerText = parsed.text || "[Медиа]";
                            } catch (e) {
                                msgBox.innerText = raw;
                            }
                        } else if (msgBox) {
                            msgBox.innerText = "Нет сообщений";
                        }
                    });
                });
            });
        }

        async function deleteDialog(event, peerId) {
            event.stopPropagation();
            if (confirm("Вы действительно хотите удалить этот чат из списка?")) {
                await window.fb.remove(window.fb.ref(window.fb.db, `users/${myUid}/chats/${peerId}`));

        function formatTimeDiff(timestamp) {
            if (!timestamp) return "офлайн";
            const diff = Date.now() - timestamp;
            const mins = Math.floor(diff / 60000);
            if (mins < 1) return "только что";
            if (mins < 60) return `${mins}м назад`;
            const hours = Math.floor(mins / 60);
            if (hours < 24) return `${hours}ч назад`;
            return new Date(timestamp).toLocaleDateString();
        }

        // --- ОКНО ЧАТА И ИСТОРИЯ ---
        function openChatWindow(peerId, roomId) {
            if (unsubChatMessages) unsubChatMessages();
            if (unsubHeaderPresence) unsubHeaderPresence();

            currentPeer = peerId;
            currentRoomId = roomId;

            document.getElementById('chat-window').classList.add('active');
            
            const feed = document.getElementById('chat-feed');
            feed.innerHTML = `<div style="text-align:center;color:var(--text-muted);margin-top:20px;">Загрузка истории...</div>`;

            const isCloud = (peerId === myUid);
            const headerAv = document.getElementById('chat-header-av');
            const headerTitle = document.getElementById('chat-header-title');
            const headerStatus = document.getElementById('chat-header-status');

            if (isCloud) {
                headerTitle.innerText = "Избранное (Облако)";
                headerAv.style.backgroundImage = "none";
                headerAv.style.backgroundColor = "var(--accent)";
                headerAv.innerText = "☁️";
                headerStatus.innerText = "персональное хранилище";
            } else {
                // ЖИВОЙ СЛУШАТЕЛЬ ДЛЯ ШАПКИ ЧАТА
                unsubHeaderPresence = window.fb.onValue(window.fb.ref(window.fb.db, `users/${peerId}/profile`), (snap) => {
                    if (snap.exists()) {
                        const prof = snap.val();
                        const displayName = (prof.name || "Без имени") + (prof.lastname ? " " + prof.lastname : "");
                        headerTitle.innerText = displayName;

                        if (prof.avatar) {
                            headerAv.style.backgroundImage = `url(${prof.avatar})`;
                            headerAv.innerText = "";
                            headerAv.style.backgroundColor = "transparent";
                        } else {
                            headerAv.style.backgroundImage = "none";
                            let colorIndex = Math.abs(peerId.charCodeAt(0)) % TG_AVATAR_COLORS.length;
                            headerAv.style.backgroundColor = TG_AVATAR_COLORS[colorIndex];
                            headerAv.innerText = displayName[0].toUpperCase();
                        }
                    }
                });

                // Живой онлайн статус в шапке
                const unsubPresence = window.fb.onValue(window.fb.ref(window.fb.db, `users/${peerId}/presence`), (snap) => {
                    if (snap.exists() && snap.val().status === "online") {
                        headerStatus.innerText = "в сети";
                        headerStatus.style.color = "var(--online)";
                    } else if (snap.exists()) {
                        headerStatus.innerText = `был(а) в сети ${formatTimeDiff(snap.val().lastSeen)}`;
                        headerStatus.style.color = "var(--text-muted)";
                    } else {
                        headerStatus.innerText = "офлайн";
                        headerStatus.style.color = "var(--text-muted)";
                    }
                });

                const oldUnsubHeader = unsubHeaderPresence;
                unsubHeaderPresence = () => {
                    if (oldUnsubHeader) oldUnsubHeader();
                    unsubPresence();
                };
            }

            // Загрузка переписки
            unsubChatMessages = window.fb.onValue(window.fb.ref(window.fb.db, `messages/${currentRoomId}/list`), (snapshot) => {
                feed.innerHTML = "";
                if (!snapshot.exists()) {
                    feed.innerHTML = `<div style="text-align:center;color:var(--text-muted);margin-top:20px;font-size:14px;">Сообщений нет. Начните переписку!</div>`;
                    return;
                }
                
                const messages = snapshot.val();
                Object.entries(messages).forEach(([msgId, m]) => {
                    const isOut = m.sender === myUid;
                    const container = document.createElement('div');
                    container.className = `msg-container ${isOut ? 'out' : 'in'}`;

                    let raw = m.text || "";
                    if (raw.startsWith("[MEOW]")) {
                        raw = aesDecrypt(raw.substring(6), BASE_AES_KEY);
                    }

                    let messageObject = { text: raw };
                    try {
                        messageObject = JSON.parse(raw);
                    } catch (e) {}

                    let bubbleHtml = `<div class="msg-bubble">`;
                    if (messageObject.fileData) {
                        if (messageObject.fileType && messageObject.fileType.startsWith('video/')) {
                            bubbleHtml += `<div class="msg-media" onclick="viewMediaFull('${messageObject.fileData}', true)"><video src="${messageObject.fileData}" style="width:100%;height:100%;object-fit:cover;"></video></div>`;
                        } else {
                            bubbleHtml += `<div class="msg-media" onclick="viewMediaFull('${messageObject.fileData}', false)"><img src="${messageObject.fileData}"></div>`;
                        }
                    }
                    if (messageObject.text && messageObject.text !== "[Медиа]") {
                        bubbleHtml += `<div>${messageObject.text}</div>`;
                    }
                    bubbleHtml += `
                        <div class="msg-meta">
                            <span>${new Date(m.time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>
                        </div>
                    </div>`;

                    container.innerHTML = bubbleHtml;
                    feed.appendChild(container);
                });

                feed.scrollTop = feed.scrollHeight;
            });
        }

        function closeChat() {
            if (unsubChatMessages) unsubChatMessages();
            if (unsubHeaderPresence) unsubHeaderPresence();
            document.getElementById('chat-window').classList.remove('active');
            currentPeer = null;
            currentRoomId = null;
        }

        async function handleSendClick() {

            const txt = input.value.trim();
            if (!txt) return;

            const dbPacket = {

        // --- МОМЕНТАЛЬНОЕ УЛЬТРА-СЖАТИЕ И ОТПРАВКА ФОТО/ВИДЕО ---
        async function compressAndSendMedia(file) {
            if (!file) return;

            const clipBtn = document.getElementById('clip-btn');
            const sendBtn = document.getElementById('send-btn');
            
            // Включаем визуальный индикатор отправки
            clipBtn.innerText = "⏳";
            sendBtn.innerText = "⏳";

            try {
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = (event) => {
                        const img = new Image();
                        img.src = event.target.result;
                        img.onload = async () => {
                            const canvas = document.createElement('canvas');
                            let width = img.width;
                            let height = img.height;
                            
                            // 500px макс сторона — идеальное мобильное качество без лишнего веса!
                            const maxSide = 500; 

                            if (width > height) {
                                if (width > maxSide) {
                                    height = Math.round((height * maxSide) / width);
                                    width = maxSide;
                                }
                            } else {
                                if (height > maxSide) {
                                    width = Math.round((width * maxSide) / height);
                                    height = maxSide;
                                }
                            }

                            canvas.width = width;
                            canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            
                            // Качество 0.55 ужимает размер фото до 12-25 КБ! Передается секунда в секунду!
                            const compressedBase64 = canvas.toDataURL('image/jpeg', 0.55);
                            await transmitMedia(compressedBase64, 'image/jpeg');
                            
                            clipBtn.innerText = "📎";
                            sendBtn.innerText = "➤";
                        };
                    };
                } else if (file.type.startsWith('video/')) {
                    // Ограничиваем видео до 1.5 МБ
                    if (file.size > 1.5 * 1024 * 1024) {
                        alert("Размер видео превышает 1.5 МБ. Пожалуйста, отправляйте более короткие ролики!");
                        clipBtn.innerText = "📎";
                        sendBtn.innerText = "➤";
                        return;
                    }
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = async (event) => {
                        await transmitMedia(event.target.result, file.type);
                        clipBtn.innerText = "📎";
                        sendBtn.innerText = "➤";
                    };
                }
            } catch (err) {
                console.error(err);
                alert("Ошибка во время отправки файла!");
                clipBtn.innerText = "📎";
                sendBtn.innerText = "➤";
            }
        }

        async function transmitMedia(base64Data, fileType) {
            const rawStr = JSON.stringify({
                text: "[Медиа]",
                fileData: base64Data,
                fileType: fileType
            });
            const finalString = "[MEOW]" + aesEncrypt(rawStr, BASE_AES_KEY);

            const dbPacket = {
                sender: myUid,
                text: finalString,
                time: Date.now()
            };

            await window.fb.push(window.fb.ref(window.fb.db, `messages/${currentRoomId}/list`), dbPacket);
        }

        function fileToBase64(file) {
            return new Promise((res, rej) => {
                const r = new FileReader();
                r.readAsDataURL(file);
                r.onload = () => res(r.result);
                r.onerror = e => rej(e);
            });
        }

            } else {
                content.innerHTML = `<img src="${data}" style="max-width:100%; max-height:100%; object-fit:contain;">`;
            }
        }

        }

        // --- ПОИСК СОБЕСЕДНИКА ПО НИКУ ---
        async function searchPeople() {
            let target = document.getElementById('search-by-username').value.trim().toLowerCase().replace('@', '');
            if (!target) return;

            const myUserSnap = await window.fb.get(window.fb.ref(window.fb.db, `users/${myUid}/profile`));
            const myProf = myUserSnap.val();
            if (target === myProf.username) {
                alert("Это ваш никнейм. Пользуйтесь Облаком (иконка облака наверху)!");
                return;
            }

            const snap = await window.fb.get(window.fb.ref(window.fb.db, `usernames/${target}`));
            if (snap.exists()) {
                const targetUid = snap.val();
                closeModal('search-people-modal');

                // Исключительно чистый Room ID без дублирования мутабельных полей
                const rId = [myUid, targetUid].sort().join("_");

                // Добавляем чат инициатору
                await window.fb.set(window.fb.ref(window.fb.db, `users/${myUid}/chats/${targetUid}`), {
                    roomId: rId
                });
                
                // Добавляем чат получателю
                await window.fb.set(window.fb.ref(window.fb.db, `users/${targetUid}/chats/${myUid}`), {
                    roomId: rId
                });

                alert("Диалог начат!");
                openChatWindow(targetUid, rId);
            } else {
                alert("Пользователь с таким никнеймом не найден!");
            }
        }
