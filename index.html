<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VK Meow Messenger</title>
    
    <!-- CryptoJS для базового AES-шифрования -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

    <!-- Инициализация Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, onChildAdded, get, child, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Твой конфиг Firebase
        const firebaseConfig = {
          apiKey: "AIzaSyDQMqwnJp34H6I7ragLr14LQ4YszpDFYbg",
          authDomain: "meowmessenger.firebaseapp.com",
          databaseURL: "https://meowmessenger-default-rtdb.europe-west1.firebasedatabase.app",
          projectId: "meowmessenger",
          storageBucket: "meowmessenger.firebasestorage.app",
          messagingSenderId: "906512822162",
          appId: "1:906512822162:web:a868af851cec5a3381db4b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        window.fb = { db, auth, ref, set, push, onValue, onChildAdded, get, child, update, remove, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut };
    </script>

    <style>
        :root {
            --bg-dark: #000000;         /* Чистый черный AMOLED */
            --bg-bar: #161618;          /* Темно-серый уголь */
            --msg-out: #1F80E0;         /* Насыщенный синий */
            --msg-in: #212123;          /* Темно-серый входящий */
            --accent: #1F80E0;          /* Яркий синий акцент */
            --second: #161618;          /* Вторичный фон */
            --text-muted: #8E8E93;       /* Серый приглушенный */
            --text-white: #F2F2F7;       /* Элегантный белый */
            --online: #34C759;          /* Сочный зеленый */
            --error: #FF3B30;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-white);
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background 0.3s ease;
        }

        /* ШАПКА */
        .header-bar {
            height: 64px;
            background-color: var(--bg-bar);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            border-bottom: 1px solid #1a1a1c;
            z-index: 100;
        }

        .header-title-box {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-logo {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .header-title {
            font-size: 19px;
            font-weight: 700;
            color: var(--text-white);
        }

        .header-buttons {
            display: flex;
            gap: 5px;
        }

        .header-btn {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            padding: 8px;
            cursor: pointer;
            border-radius: 50%;
            transition: background 0.2s;
        }

        .header-btn:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        /* ОСНОВНОЙ КОНТЕНТ */
        .main-container {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .tab-panel {
            width: 100%;
            height: 100%;
            display: none;
            overflow-y: auto;
        }

        .tab-panel.active {
            display: block;
        }

        /* НИЖНИЙ НАВИГАТОР */
        .bottom-bar {
            height: 64px;
            background-color: var(--bg-bar);
            display: flex;
            border-top: 1px solid #1a1a1c;
            z-index: 100;
        }

        .tab-button {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.2s ease;
        }

        .tab-pill {
            width: 64px;
            height: 32px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: background 0.2s;
        }

        .tab-button.active .tab-pill {
            background-color: #2C2C2E;
        }

        .tab-button.active {
            color: var(--accent);
        }

        .tab-label {
            font-size: 11px;
            margin-top: 4px;
        }

        /* СЕГМЕНТЫ (ЧАТЫ / ГРУППЫ) */
        .segment-wrapper {
            margin: 10px 16px 6px 16px;
            background: #1C1C1E;
            padding: 4px;
            border-radius: 8px;
            display: flex;
        }

        .segment-btn {
            flex: 1;
            padding: 6px;
            text-align: center;
            font-size: 13px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            color: var(--text-muted);
        }

        .segment-btn.active {
            background: #2C2C2E;
            color: white;
        }

        /* ПОИСК */
        .search-row {
            margin: 10px 16px;
            display: flex;
            gap: 10px;
        }

        .search-bar {
            flex: 1;
            height: 44px;
            border-radius: 22px;
            border: 1px solid #2C2C2E;
            background: #1C1C1E;
            color: white;
            padding: 0 16px;
            outline: none;
            font-size: 15px;
        }

        .search-action-btn {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: #1C1C1E;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        /* СПИСОК ЧАТОВ */
        .chats-list {
            list-style: none;
        }

        .chat-row {
            display: flex;
            align-items: center;
            padding: 10px 16px;
            cursor: pointer;
            border-bottom: 1px solid #161618;
            transition: background 0.2s;
        }

        .chat-row:hover {
            background: rgba(255, 255, 255, 0.04);
        }

        .chat-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 16px;
            color: white;
            position: relative;
            flex-shrink: 0;
        }

        .online-dot {
            width: 12px;
            height: 12px;
            background: var(--online);
            border-radius: 50%;
            position: absolute;
            bottom: 0;
            right: 0;
            border: 2px solid var(--bg-dark);
            display: none;
        }

        .chat-info {
            flex: 1;
            margin-left: 14px;
            overflow: hidden;
        }

        .chat-name-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3px;
        }

        .chat-row-name {
            font-weight: bold;
            font-size: 16px;
        }

        .chat-row-time {
            font-size: 12px;
            color: var(--text-muted);
        }

        .chat-row-msg {
            font-size: 14px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ОКНО ЧАТА */
        .chat-window {
            position: fixed;
            inset: 0;
            background-color: var(--bg-dark);
            z-index: 1000;
            display: none;
            flex-direction: column;
            background-size: cover;
            background-position: center;
        }

        .chat-window.active {
            display: flex;
        }

        .chat-header {
            height: 64px;
            background-color: var(--bg-bar);
            display: flex;
            align-items: center;
            padding: 0 16px;
            border-bottom: 1px solid #1a1a1c;
        }

        .chat-header-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin-left: 8px;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .chat-header-info {
            flex: 1;
            margin-left: 10px;
        }

        .chat-header-title {
            font-size: 15px;
            font-weight: bold;
        }

        .chat-header-status {
            font-size: 12px;
            color: var(--text-muted);
        }

        .chat-feed {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* ПУЗЫРИ СООБЩЕНИЙ */
        .msg-container {
            display: flex;
            flex-direction: column;
            max-width: 70%;
        }

        .msg-container.out {
            align-self: flex-end;
        }

        .msg-container.in {
            align-self: flex-start;
        }

        .msg-bubble {
            padding: 8px 14px;
            font-size: 16px;
            line-height: 1.4;
            word-wrap: break-word;
            position: relative;
        }

        .msg-container.out .msg-bubble {
            background-color: var(--msg-out);
            border-radius: 16px 16px 4px 16px;
            color: white;
        }

        .msg-container.in .msg-bubble {
            background-color: var(--msg-in);
            border-radius: 16px 16px 16px 4px;
            color: white;
        }

        .msg-meta {
            display: flex;
            justify-content: flex-end;
            padding: 2px 6px 0 6px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
        }

        /* МЕДИА И ГОЛОСОВЫЕ */
        .msg-media {
            width: 180px;
            height: 130px;
            border-radius: 20px;
            background-color: #161618;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            margin-bottom: 4px;
        }

        .msg-media img, .msg-media video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .voice-bubble {
            width: 240px;
            padding: 8px 12px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 4px;
        }

        /* ПАНЕЛЬ ВВОДА */
        .chat-input-bar {
            padding: 8px;
            background-color: var(--bg-bar);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .input-container-inner {
            flex: 1;
            position: relative;
        }

        .message-input {
            width: 100%;
            max-height: 120px;
            min-height: 44px;
            border-radius: 22px;
            background: var(--second);
            border: none;
            outline: none;
            color: white;
            padding: 12px 16px;
            font-size: 16px;
            resize: none;
        }

        .recording-panel {
            position: absolute;
            inset: 0;
            border-radius: 22px;
            background: var(--second);
            display: none;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            color: white;
            font-weight: bold;
        }

        /* ВХОД */
        #login-screen {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .login-card {
            width: 90%;
            max-width: 400px;
            background: var(--second);
            padding: 40px 24px;
            border-radius: 24px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* МОДАЛКИ */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1500;
            backdrop-filter: blur(5px);
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-card {
            background: #161618;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* НОВОСТИ */
        .post-card {
            background: var(--second);
            border-radius: 16px;
            padding: 12px;
            margin: 12px 16px;
        }

        .post-header {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }

        .post-author-av {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-size: cover;
        }

        .post-author-info {
            margin-left: 10px;
        }

        .post-images-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 4px;
            margin: 8px 0;
        }

        .post-images-grid img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 8px;
        }

        /* АНИМЕ */
        .anime-frame {
            width: 100%;
            height: 100%;
            border: none;
            background: black;
        }
    </style>
</head>
<body>

    <!-- ЭКРАН ВХОДА -->
    <div id="login-screen">
        <div class="login-card">
            <div style="font-size: 60px; margin-bottom: 10px;">🐾</div>
            <h1 style="font-size: 24px; margin-bottom: 10px;">VK Meow</h1>
            <p style="color: var(--text-muted); font-size: 13px; margin-bottom: 24px;">Firebase Secure Edition</p>
            
            <input type="email" id="login-email" class="search-bar" style="margin-bottom: 12px; border-radius: 12px; width:100%;" placeholder="Электронная почта">
            <input type="password" id="login-password" class="search-bar" style="margin-bottom: 20px; border-radius: 12px; width:100%;" placeholder="Пароль">
            
            <button class="search-action-btn" onclick="authAction()" style="width: 100%; background: var(--accent); color: white; font-weight: bold; border-radius: 12px;">Войти / Зарегистрироваться</button>
            <div id="auth-error" style="color: var(--error); margin-top: 15px; font-size: 13px; display: none;"></div>
        </div>
    </div>

    <!-- ШАПКА ПРИЛОЖЕНИЯ -->
    <div class="header-bar" id="app-header">
        <div class="header-title-box">
            <div class="header-logo">🐾</div>
            <div class="header-title" id="header-main-title">VK Meow</div>
        </div>
        <div class="header-buttons">
            <button class="header-btn" onclick="openCloudChat()">☁️</button>
            <button class="header-btn" onclick="openModal('profile-settings-modal')">⚙️</button>
            <button class="header-btn" onclick="openModal('background-modal')">🎨</button>
            <button class="header-btn" onclick="logoutAction()">🚪</button>
        </div>
    </div>

    <!-- ТЕЛО СТРАНИЦЫ (ВКЛАДКИ) -->
    <div class="main-container">
        
        <!-- ВКЛАДКА 0: ЧАТЫ -->
        <div class="tab-panel active" id="tab-0">
            <div class="segment-wrapper">
                <div class="segment-btn active" id="seg-chats" onclick="switchSegment(0)">Чаты</div>
                <div class="segment-btn" id="seg-groups" onclick="switchSegment(1)">Группы</div>
            </div>
            <div class="search-row">
                <input type="text" id="chat-search" class="search-bar" placeholder="Поиск диалогов..." oninput="filterDialogs(this.value)">
                <button class="search-action-btn" style="background: #1C1C1E;" onclick="openModal('search-people-modal')">👤</button>
            </div>
            <div class="chats-list" id="chats-list-container"></div>
        </div>

        <!-- ВКЛАДКА 1: НОВОСТИ -->
        <div class="tab-panel" id="tab-1">
            <div id="news-container"></div>
        </div>

        <!-- ВКЛАДКА 2: АНИМЕ -->
        <div class="tab-panel" id="tab-2">
            <iframe src="https://notanime.ru" class="anime-frame"></iframe>
        </div>

    </div>

    <!-- НИЖНИЙ НАВИГАТОР -->
    <div class="bottom-bar" id="app-bottom-bar">
        <div class="tab-button active" onclick="switchTab(0)">
            <div class="tab-pill">💬</div>
            <div class="tab-label">Диалоги</div>
        </div>
        <div class="tab-button" onclick="switchTab(1)">
            <div class="tab-pill">📰</div>
            <div class="tab-label">Новости</div>
        </div>
        <div class="tab-button" onclick="switchTab(2)">
            <div class="tab-pill">⛩️</div>
            <div class="tab-label">Аниме</div>
        </div>
    </div>

    <!-- ОКНО ЧАТА -->
    <div class="chat-window" id="chat-window">
        <div class="chat-header">
            <button class="header-btn" onclick="closeChat()">⬅</button>
            <div class="chat-header-avatar" id="chat-header-av">?</div>
            <div class="chat-header-info">
                <div class="chat-header-title" id="chat-header-title">Имя пользователя</div>
                <div class="chat-header-status" id="chat-header-status">офлайн</div>
            </div>
        </div>
        
        <div class="chat-feed" id="chat-feed"></div>

        <div class="chat-input-bar">
            <input type="file" id="media-upload" style="display: none;" accept="image/*,video/*" onchange="uploadMedia(this.files[0])">
            <button class="header-btn" style="color: var(--accent)" onclick="document.getElementById('media-upload').click()">📎</button>
            <button class="header-btn" id="e2e-lock-btn" onclick="toggleEncryptionState()">🔒</button>

            <div class="input-container-inner">
                <textarea class="message-input" id="message-input" placeholder="Сообщение..." rows="1" oninput="adjustInputHeight(this)"></textarea>
                <div class="recording-panel" id="recording-panel">
                    <span style="cursor: pointer; color: var(--error);" onclick="cancelVoiceRecord()">✖️</span>
                    <span id="record-timer">00:00</span>
                    <span style="cursor: pointer; color: var(--accent);" onclick="sendVoiceRecord()">➤</span>
                </div>
            </div>

            <button class="header-btn" style="color: var(--accent)" id="send-btn" onclick="handleSendClick()">🎙️</button>
        </div>
    </div>

    <!-- МОДАЛКА НАСТРОЕК ПРОФИЛЯ -->
    <div class="modal-overlay" id="profile-settings-modal">
        <div class="modal-card">
            <h3 style="margin-bottom: 15px; text-align: center;">⚙️ Настройки профиля</h3>
            <div style="font-size: 11px; color: var(--text-muted); margin-bottom: 10px; text-align: center;">Почта скрыта и не видна другим пользователям</div>
            <input type="text" id="setting-name" class="search-bar" style="width: 100%; margin-bottom: 10px;" placeholder="Имя">
            <input type="text" id="setting-lastname" class="search-bar" style="width: 100%; margin-bottom: 10px;" placeholder="Фамилия (необязательно)">
            <input type="text" id="setting-username" class="search-bar" style="width: 100%; margin-bottom: 15px;" placeholder="@username">
            <button class="search-action-btn" style="width: 100%; background: var(--accent); color: white; margin-bottom: 8px;" onclick="saveProfileSettings()">Сохранить</button>
            <button class="search-action-btn" style="width: 100%; background: #2C2C2E; color: white;" onclick="closeModal('profile-settings-modal')">Отмена</button>
        </div>
    </div>

    <!-- МОДАЛКА ФОНА И ОФОРМЛЕНИЯ -->
    <div class="modal-overlay" id="background-modal">
        <div class="modal-card">
            <h3 style="margin-bottom: 15px; text-align: center;">🎨 Настройки оформления</h3>
            <button class="search-action-btn" style="width: 100%; background: #2C2C2E; color: white; margin-bottom: 8px;" onclick="toggleTransparentTheme()">Вкл/Выкл прозрачную тему</button>
            <input type="file" id="bg-upload" style="display: none;" accept="image/*" onchange="uploadBackgroundImage(this.files[0])">
            <button class="search-action-btn" style="width: 100%; background: #2C2C2E; color: white; margin-bottom: 8px;" onclick="document.getElementById('bg-upload').click()">Выбрать фото из галереи</button>
            <button class="search-action-btn" style="width: 100%; background: var(--error); color: white;" onclick="resetBackground()">Сбросить фон</button>
            <button class="search-action-btn" style="width: 100%; background: #1C1C1E; color: white; margin-top: 10px;" onclick="closeModal('background-modal')">Закрыть</button>
        </div>
    </div>

    <!-- МОДАЛКА ПОИСКА ПОЛЬЗОВАТЕЛЕЙ -->
    <div class="modal-overlay" id="search-people-modal">
        <div class="modal-card">
            <h3 style="margin-bottom: 15px; text-align: center;">👤 Найти котика по нику</h3>
            <input type="text" id="search-by-username" class="search-bar" style="width: 100%; margin-bottom: 12px;" placeholder="@username">
            <button class="search-action-btn" style="width: 100%; background: var(--accent); color: white; margin-bottom: 8px;" onclick="searchPeople()">Найти</button>
            <button class="search-action-btn" style="width: 100%; background: #2C2C2E; color: white;" onclick="closeModal('search-people-modal')">Закрыть</button>
        </div>
    </div>

    <!-- МОДАЛКА ПРОСМОТРА КАРТИНКИ / ВИДЕО -->
    <div class="modal-overlay" id="media-viewer-modal" style="background: black;">
        <span style="position: absolute; top: 20px; left: 20px; font-size: 30px; cursor: pointer; z-index: 10;" onclick="closeMediaViewer()">✕</span>
        <div id="media-viewer-content" style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;"></div>
    </div>

    <!-- ЛОГИКА ПРИЛОЖЕНИЯ -->
    <script>
        const TG_AVATAR_COLORS = ["#E17076", "#FAA774", "#A695E7", "#34C759", "#6EC9CB", "#1F80E0"];
        const BASE_AES_KEY = "12345678901234567890123456789012";

        let myUid = null;
        let myEmail = null;
        let currentPeer = null;

        // --- CRYPTO (AES-GCM Fallback на CryptoJS CBC) ---
        function aesEncrypt(text, keyString) {
            const key = CryptoJS.enc.Utf8.parse(keyString.padEnd(32, '0').slice(0, 32));
            const iv = CryptoJS.lib.WordArray.random(16);
            const encrypted = CryptoJS.AES.encrypt(text, key, { iv: iv });
            return iv.toString() + encrypted.toString();
        }

        function aesDecrypt(cipherWithIv, keyString) {
            try {
                const key = CryptoJS.enc.Utf8.parse(keyString.padEnd(32, '0').slice(0, 32));
                const iv = CryptoJS.enc.Hex.parse(cipherWithIv.slice(0, 32));
                const cipher = cipherWithIv.slice(32);
                const decrypted = CryptoJS.AES.decrypt(cipher, key, { iv: iv });
                return decrypted.toString(CryptoJS.enc.Utf8);
            } catch (e) {
                return "[Ошибка расшифровки]";
            }
        }

        // --- СОХРАНЕНИЕ ПРОФИЛЯ ---
        async function saveProfileSettings() {
            const name = document.getElementById('setting-name').value.trim();
            const lastname = document.getElementById('setting-lastname').value.trim();
            let username = document.getElementById('setting-username').value.trim().replace('@', '').toLowerCase();

            if (!name || !username) {
                alert("Имя и @username обязательны к заполнению!");
                return;
            }

            // Проверка уникальности username
            const nameCheck = await window.fb.get(window.fb.ref(window.fb.db, `usernames/${username}`));
            if (nameCheck.exists() && nameCheck.val() !== myUid) {
                alert("Данный @username уже занят другим пользователем!");
                return;
            }

            // Получаем старый ник, чтобы удалить из индекса usernames
            const profSnap = await window.fb.get(window.fb.ref(window.fb.db, `users/${myUid}/profile`));
            if (profSnap.exists() && profSnap.val().username !== username) {
                await window.fb.remove(window.fb.ref(window.fb.db, `usernames/${profSnap.val().username}`));
            }

            // Пишем в БД
            await window.fb.update(window.fb.ref(window.fb.db, `users/${myUid}/profile`), {
                name: name,
                lastname: lastname,
                username: username
            });
            await window.fb.set(window.fb.ref(window.fb.db, `usernames/${username}`), myUid);

            closeModal('profile-settings-modal');
            alert("Профиль успешно обновлен!");
            loadDialogs();
        }

                                    <div class="chat-row-name">${chatMeta.name}</div>
                                    <div class="chat-row-time" id="time-${peerId}">Meow</div>
                                </div>
                                <div class="chat-row-msg" id="last-msg-${peerId}">Загрузка сообщений...</div>
                            </div>
                        `;
                        container.appendChild(row);

                        // Слушаем статус присутствия
                        window.fb.onValue(window.fb.ref(window.fb.db, `users/${peerId}/presence`), (pSnap) => {
                            const dot = document.getElementById(`dot-${peerId}`);

                        // Получаем последнее сообщение
                        window.fb.onValue(window.fb.ref(window.fb.db, `messages/${chatMeta.roomId}/list`), (mSnap) => {
                            const msgBox = document.getElementById(`last-msg-${peerId}`);

                                const lastM = messages[messages.length - 1];

                                    decrypted = aesDecrypt(decrypted.substring(6), BASE_AES_KEY);

                                try {
                                    const parsed = JSON.parse(decrypted);
                                    msgBox.innerText = parsed.text || "[Медиа]";

        function formatTimeDiff(timestamp) {
            if (!timestamp) return "офлайн";
            const diff = Date.now() - timestamp;
            const minutes = Math.floor(diff / 60000);
            if (minutes < 1) return "только что";
            if (minutes < 60) return `${minutes}м назад`;
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return `${hours}ч назад`;
            return new Date(timestamp).toLocaleDateString();
        }

        // --- КАТАЛОГ СИСТЕМЫ СООБЩЕНИЙ ---
        function loadMessages() {
            const feed = document.getElementById('chat-feed');
            feed.innerHTML = "";

            window.fb.onChildAdded(window.fb.ref(window.fb.db, `messages/${currentRoomId}/list`), (snap) => {
                if (!currentRoomId) return;
                const m = snap.val();
                
                const isOut = m.sender === myUid;
                const container = document.createElement('div');
                container.className = `msg-container ${isOut ? 'out' : 'in'}`;

                // Расшифровка
                let decryptedPayload = m.text || "";
                if (decryptedPayload.startsWith("[MEOW]")) {
                    decryptedPayload = aesDecrypt(decryptedPayload.substring(6), BASE_AES_KEY);
                }

                let messageObject = { text: decryptedPayload };
                try {
                    messageObject = JSON.parse(decryptedPayload);
                } catch (e) {}

                let bubbleHtml = `<div class="msg-bubble">`;
                
                if (messageObject.fileData) {
                    if (messageObject.fileType.startsWith('image/')) {
                        bubbleHtml += `<div class="msg-media" onclick="viewMediaFull('${messageObject.fileData}', 'image')"><img src="${messageObject.fileData}"></div>`;
                    } else if (messageObject.fileType.startsWith('video/')) {
                        bubbleHtml += `<div class="msg-media" onclick="viewMediaFull('${messageObject.fileData}', 'video')"><video src="${messageObject.fileData}"></video></div>`;
                    } else if (messageObject.fileType.startsWith('audio/')) {
                        bubbleHtml += `
                            <div class="voice-bubble" style="background: var(--bg-bar);">
                                <span style="cursor:pointer;" onclick="playVoiceMessage('${messageObject.fileData}', this)">▶️</span>
                                <span style="font-size:12px;">Голосовое</span>
                                <span style="font-size:11px; cursor:pointer; color: var(--accent);" onclick="toggleVoiceSpeed(this)">1.0x</span>
                            </div>
                        `;
                    }
                }

                if (messageObject.text && messageObject.text !== "[Медиа]") {
                    bubbleHtml += `<div>${messageObject.text}</div>`;
                }

                bubbleHtml += `
                        <div class="msg-meta">
                            <span>${new Date(m.time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>
                            <span style="cursor: pointer; margin-left: 8px; color: var(--accent);" onclick="translateTextBubble(this, '${messageObject.text}')">🌐</span>
                        </div>
                    </div>
                `;

                container.innerHTML = bubbleHtml;
                feed.appendChild(container);
                feed.scrollTop = feed.scrollHeight;
            });
        }

        async function handleSendClick() {
            const txtArea = document.getElementById('message-input');
            const txt = txtArea.value.trim();

            if (isRecording) {
                stopVoiceRecordAndSend();
            } else if (txt) {
                sendSecurePayload({ text: txt });
                txtArea.value = "";
                txtArea.style.height = "auto";
                updateSendButton();
            } else {
                startVoiceRecord();
            }
        }

        function sendSecurePayload(payload) {
            const rawStr = JSON.stringify(payload);
            const isEncState = localStorage.getItem(`enc_state_${currentPeer}`) !== "false";

            let finalString = rawStr;
            if (isEncState) {
                finalString = "[MEOW]" + aesEncrypt(rawStr, BASE_AES_KEY);
            }

            const dbPacket = {
                sender: myUid,
                senderEmail: "hidden@meow.safe",
                text: finalString,
                time: Date.now()
            };

            window.fb.push(window.fb.ref(window.fb.db, `messages/${currentRoomId}/list`), dbPacket);
        }

        // --- ГОЛОСОВЫЕ ЗАПИСИ ---
        async function startVoiceRecord() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                alert("Микрофон недоступен!");
                return;
            }

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                voiceChunks = [];

                mediaRecorder.ondataavailable = e => voiceChunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(voiceChunks, { type: 'audio/webm' });
                    const base64 = await fileToBase64(audioBlob);
                    sendSecurePayload({
                        text: "[Медиа]",
                        fileData: base64,
                        fileType: 'audio/webm'
                    });
                };

                mediaRecorder.start();
                isRecording = true;
                recordDuration = 0;

                document.getElementById('message-input').style.display = 'none';
                document.getElementById('recording-panel').style.display = 'flex';
                document.getElementById('send-btn').innerText = "🛑";

                recordInterval = setInterval(() => {
                    recordDuration++;
                    const m = Math.floor(recordDuration / 60);
                    const s = recordDuration % 60;
                    document.getElementById('record-timer').innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
                }, 1000);
            } catch (err) {
                alert(err.message);
            }
        }

        function stopVoiceRecordAndSend() {
            clearInterval(recordInterval);
            isRecording = false;
            mediaRecorder.stop();
            mediaRecorder.stream.getTracks().forEach(track => track.stop());

            document.getElementById('message-input').style.display = 'block';
            document.getElementById('recording-panel').style.display = 'none';
            document.getElementById('send-btn').innerText = "🎙️";
        }

        function cancelVoiceRecord() {
            clearInterval(recordInterval);
            isRecording = false;
            mediaRecorder.stop();
            mediaRecorder.stream.getTracks().forEach(track => track.stop());
            voiceChunks = [];

            document.getElementById('message-input').style.display = 'block';
            document.getElementById('recording-panel').style.display = 'none';
            document.getElementById('send-btn').innerText = "🎙️";
        }

        function playVoiceMessage(base64, playBtn) {
            if (currentAudio) currentAudio.pause();
            currentAudio = new Audio(base64);
            currentAudio.play();
            playBtn.innerText = "⏸️";
            currentAudio.onended = () => { playBtn.innerText = "▶️"; };
        }

        function toggleVoiceSpeed(btn) {
            if (!currentAudio) return;
            if (currentAudio.playbackRate === 1.0) {
                currentAudio.playbackRate = 1.5;
                btn.innerText = "1.5x";
            } else if (currentAudio.playbackRate === 1.5) {
                currentAudio.playbackRate = 2.0;
                btn.innerText = "2.0x";
            } else {
                currentAudio.playbackRate = 1.0;
                btn.innerText = "1.0x";
            }
        }

        // --- ВСПЛЫВАЮЩИЙ ПЕРЕВОДЧИК ---
        async function translateTextBubble(btn, text) {
            try {
                const response = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=ru&dt=t&q=${encodeURIComponent(text)}`);
                const data = await response.json();
                const translated = data[0][0][0];
                alert("Перевод: " + translated);
            } catch (err) {
                alert("Ошибка перевода!");
            }
        }

        // --- ПОИСК КОТИКОВ ПО НИКУ ---
        async function searchPeople() {
            let target = document.getElementById('search-by-username').value.trim().toLowerCase().replace('@', '');
            if (!target) return;

            const snap = await window.fb.get(window.fb.ref(window.fb.db, `usernames/${target}`));
            if (snap.exists()) {
                const targetUid = snap.val();
                
                // Получаем профиль
                const profSnap = await window.fb.get(window.fb.ref(window.fb.db, `users/${targetUid}/profile`));
                if (profSnap.exists()) {
                    const prof = profSnap.val();
                    closeModal('search-people-modal');

                    // Генерируем ID комнаты на основе хешей UID
                    const rId = targetUid < myUid ? `${targetUid}_${myUid}` : `${myUid}_${targetUid}`;
                    
                    // Добавляем контакт обоим
                    await window.fb.set(window.fb.ref(window.fb.db, `users/${myUid}/chats/${targetUid}`), {
                        name: prof.name + (prof.lastname ? " " + prof.lastname : ""),
                        avatar: prof.avatar || "",
                        roomId: rId
                    });
                    
                    // Подтягиваем данные отправителя для второй стороны
                    const myProfSnap = await window.fb.get(window.fb.ref(window.fb.db, `users/${myUid}/profile`));
                    const myProf = myProfSnap.val();
                    await window.fb.set(window.fb.ref(window.fb.db, `users/${targetUid}/chats/${myUid}`), {
                        name: myProf.name + (myProf.lastname ? " " + myProf.lastname : ""),
                        avatar: myProf.avatar || "",
                        roomId: rId
                    });

                    alert("Диалог успешно создан!");
                    openChatWindow(targetUid, prof.name + (prof.lastname ? " " + prof.lastname : ""), prof.avatar, rId);
                }
            } else {
                alert("Котик с таким ником не зарегистрирован!");
            }
        }

        function toggleEncryptionState() {
            const isEnc = localStorage.getItem(`enc_state_${currentPeer}`) !== "false";
            localStorage.setItem(`enc_state_${currentPeer}`, !isEnc);
            document.getElementById('e2e-lock-btn').innerText = !isEnc ? "🔒" : "🔓";
            alert(!isEnc ? "Шифрование чата активировано!" : "Шифрование чата отключено!");
        }

        // Вспомогательные функции
        function fileToBase64(file) {
            return new Promise((res, rej) => {
                const r = new FileReader();
                r.readAsDataURL(file);
                r.onload = () => res(r.result);
                r.onerror = e => rej(e);
            });
        }

        function adjustInputHeight(el) {
            el.style.height = 'auto';
            el.style.height = el.scrollHeight + 'px';
            updateSendButton();
        }

        function updateSendButton() {
            const val = document.getElementById('message-input').value.trim();
            document.getElementById('send-btn').innerText = val ? "➤" : "🎙️";
        }

        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        // Инициализация базы данных (Новости, группы)
        async function seedDatabaseIfNeeded() {
            const newsSnap = await window.fb.get(window.fb.ref(window.fb.db, `news`));
            if (!newsSnap.exists()) {
                window.fb.set(window.fb.ref(window.fb.db, `news/post1`), {
                    authorName: "VK Meow Official",
                    authorAvatar: "https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?q=80&w=200&auto=format&fit=crop",
                    text: "Мяу! Все ваши сообщения шифруются по стандарту AES-256 прямо на вашем устройстве.",
                    date: Date.now(),
                    likes: 5,
                    image: "https://images.unsplash.com/photo-1533738363-b7f9aef128ce?q=80&w=600&auto=format&fit=crop"
                });
            }
            const groupSnap = await window.fb.get(window.fb.ref(window.fb.db, `groups`));
            if (!groupSnap.exists()) {
                window.fb.set(window.fb.ref(window.fb.db, `groups/official`), {
                    name: "Кошачий Мир",
                    avatar: "https://images.unsplash.com/photo-1543466835-00a7907e9de1?q=80&w=200&auto=format&fit=crop",
                    description: "Группа любителей пушистых котиков."
                });
            }
        }
    </script>
