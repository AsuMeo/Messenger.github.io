<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MeowMail Cloud (Firebase)</title>
    
    <!-- Подключаем Firebase SDK через CDN -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, onChildAdded, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getStorage, ref as storageRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        // Подключаем CryptoJS для шифрования/дешифрования
        import CryptoJS from "https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js";

        // Конфигурация Firebase вашего веб-приложения
        const firebaseConfig = {
          apiKey: "AIzaSyDQMqwnJp34H6I7ragLr14LQ4YszpDFYbg",
          authDomain: "meowmessenger.firebaseapp.com",
          databaseURL: "https://meowmessenger-default-rtdb.europe-west1.firebasedatabase.app",
          projectId: "meowmessenger",
          storageBucket: "meowmessenger.firebasestorage.app",
          messagingSenderId: "906512822162",
          appId: "1:906512822162:web:a868af851cec5a3381db4b"
        };

        // Инициализация
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app, firebaseConfig.databaseURL);
        const auth = getAuth(app);
        const storage = getStorage(app);

        // --- ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ---
        let currentUser = null;
        let activeChatEmail = null;
        let activeRoomId = null;
        let activePeerProfile = null; // Для хранения профиля текущего собеседника
        let myProfile = null; // Для хранения профиля текущего пользователя

        // --- Переменные для записи аудио ---
        let mediaRecorder;
        let audioChunks = [];
        let recordingStartTime;
        let recordingTimerInterval;

        // --- Ключ для AES шифрования (ОЧЕНЬ ВАЖНО: в реальном приложении это должно быть реализовано через безопасный обмен ключами,
        // но для демонстрации "шифрования на клиенте" используем деривацию из RoomId + статичный Salt) ---
        const AES_STATIC_SALT = "MeowMailSuperSecretKeySalt123!@#SecureChat"; 
        function getChatKey(roomId) {
            // SHA256 хеш от roomId и статического соли для получения ключа AES
            return CryptoJS.SHA256(roomId + AES_STATIC_SALT).toString(CryptoJS.enc.Hex);
        }

        // --- ФУНКЦИИ ВХОДА ---
        window.authAction = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('login-btn');
            const errDiv = document.getElementById('auth-error');
            
            btn.disabled = true;
            btn.innerText = "Минутку...";
            errDiv.innerText = "";

            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (err) {
                if (err.code === 'auth/user-not-found') {
                    try {
                        await createUserWithEmailAndPassword(auth, email, password);
                    } catch (regErr) {
                        errDiv.innerText = "Ошибка регистрации: " + regErr.message;
                        btn.disabled = false;
                        btn.innerText = "Войти / Регистрация";
                    }
                } else {
                    errDiv.innerText = "Ошибка входа: " + err.message;
                    btn.disabled = false;
                    btn.innerText = "Войти / Регистрация";
                }
            }
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const cleanEmail = currentUser.email.replace(/\./g, '_');
                myProfile = await getUserProfile(currentUser.email);

                if (!myProfile || !myProfile.username) {
                    // Если у пользователя нет профиля или юзернейма, показать модальное окно для создания
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('profile-setup-modal').classList.add('active');
                } else {
                    document.getElementById('login-screen').style.display = 'none';
                    updateMyProfileUI(); // Обновить UI с данными профиля
                    loadMyChats();
                }
            } else {
                currentUser = null;
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('profile-setup-modal').classList.remove('active');
            }
        });

        // --- УПРАВЛЕНИЕ ПРОФИЛЕМ (@username, Аватар, Описание) ---
        async function getUserProfile(email) {
            const cleanEmail = email.replace(/\./g, '_');
            const snapshot = await get(ref(db, `user_profiles/${cleanEmail}`));
            return snapshot.val();
        }

        async function getProfileByUsername(username) {
            const snapshot = await get(ref(db, 'user_profiles'));
            const profiles = snapshot.val();
            if (profiles) {
                for (const cleanEmail in profiles) {
                    if (profiles[cleanEmail].username === username) {
                        return { email: cleanEmail.replace(/_/g, '.'), ...profiles[cleanEmail] };
                    }
                }
            }
            return null;
        }

        window.setupOrUpdateProfile = async (isSetup = true) => {
            const usernameInput = document.getElementById(isSetup ? 'setup-username' : 'profile-username');
            const descriptionInput = document.getElementById(isSetup ? 'setup-description' : 'profile-description');
            const avatarFile = document.getElementById(isSetup ? 'setup-avatar-file' : 'profile-avatar-file').files[0];
            const errorDiv = document.getElementById(isSetup ? 'setup-profile-error' : 'profile-error');
            const btn = document.getElementById(isSetup ? 'setup-profile-btn' : 'profile-save-btn');

            const username = usernameInput.value.trim().toLowerCase();
            const description = descriptionInput.value.trim();

            errorDiv.innerText = "";
            if (!username) { errorDiv.innerText = "Юзернейм не может быть пустым."; return; }
            if (!/^[a-z0-9_]{5,32}$/.test(username)) { errorDiv.innerText = "Юзернейм должен содержать только английские буквы, цифры, подчеркивания и быть длиной от 5 до 32 символов."; return; }

            btn.disabled = true;
            btn.innerText = "Сохранение...";

            try {
                // Проверка на уникальность юзернейма
                if (!myProfile || myProfile.username !== username) { // Если юзернейм изменился или его не было
                    const existingProfile = await getProfileByUsername(username);
                    if (existingProfile && existingProfile.email !== currentUser.email) {
                        errorDiv.innerText = `Юзернейм @${username} уже занят.`;
                        btn.disabled = false;
                        btn.innerText = isSetup ? "Создать профиль" : "Сохранить";
                        return;
                    }
                }

                let avatarUrl = myProfile ? myProfile.avatarUrl : null;
                if (avatarFile) {
                    const avatarRef = storageRef(storage, `avatars/${currentUser.uid}/${avatarFile.name}`);
                    await uploadBytes(avatarRef, avatarFile);
                    avatarUrl = await getDownloadURL(avatarRef);
                }

                const cleanEmail = currentUser.email.replace(/\./g, '_');
                await set(ref(db, `user_profiles/${cleanEmail}`), {
                    email: currentUser.email,
                    username: username,
                    description: description,
                    avatarUrl: avatarUrl
                });
                myProfile = await getUserProfile(currentUser.email); // Обновить локальный профиль

                if (isSetup) {
                    document.getElementById('profile-setup-modal').classList.remove('active');
                    loadMyChats(); // Загрузить чаты после создания профиля
                } else {
                    document.getElementById('profile-modal').classList.remove('active');
                }
                updateMyProfileUI();
            } catch (error) {
                console.error("Ошибка сохранения профиля:", error);
                errorDiv.innerText = "Ошибка сохранения профиля: " + error.message;
            } finally {
                btn.disabled = false;
                btn.innerText = isSetup ? "Создать профиль" : "Сохранить";
            }
        };

        window.showMyProfile = async () => {
            if (!myProfile) {
                myProfile = await getUserProfile(currentUser.email);
            }
            document.getElementById('profile-username').value = myProfile?.username || '';
            document.getElementById('profile-description').value = myProfile?.description || '';
            document.getElementById('profile-avatar-display').src = myProfile?.avatarUrl || 'default_avatar.png'; // Установите аватар
            document.getElementById('profile-modal').classList.add('active');
        };

        function updateMyProfileUI() {
            if (myProfile) {
                const myProfileBtn = document.getElementById('my-profile-btn');
                const avatarDiv = myProfileBtn.querySelector('.avatar');
                const nameDiv = myProfileBtn.querySelector('b');

                if (avatarDiv) avatarDiv.style.backgroundImage = myProfile.avatarUrl ? `url(${myProfile.avatarUrl})` : '';
                if (avatarDiv && !myProfile.avatarUrl) avatarDiv.innerText = (myProfile.username || currentUser.email)[0].toUpperCase();
                if (nameDiv) nameDiv.innerText = `@${myProfile.username || currentUser.email}`;
            }
        }
        
        // --- РАБОТА С ЧАТАМИ ---
        window.createNewChat = async () => {
            const peerIdentifier = document.getElementById('new-chat-input').value.trim();
            if (!peerIdentifier) return;

            let peerEmail = peerIdentifier.toLowerCase();
            let peerProfile = null;

            if (peerIdentifier.startsWith('@')) { // Поиск по юзернейму
                peerProfile = await getProfileByUsername(peerIdentifier.substring(1));
                if (!peerProfile) {
                    alert('Пользователь с таким юзернеймом не найден.');
                    return;
                }
                peerEmail = peerProfile.email;
            } else if (!peerEmail.includes('@') || !peerEmail.includes('.')) {
                 alert('Пожалуйста, введите корректный Email или @юзернейм.');
                 return;
            }


            if (peerEmail === currentUser.email) {
                alert("Вы не можете создать чат с самим собой. Используйте 'Избранное'.");
                return;
            }

            const roomId = await generateRoomId(currentUser.email, peerEmail);
            const myClean = currentUser.email.replace(/\./g, '_');
            const peerClean = peerEmail.replace(/\./g, '_');

            await set(ref(db, `users/${myClean}/contacts/${peerClean}`), { email: peerEmail, roomId: roomId });
            await set(ref(db, `users/${peerClean}/contacts/${myClean}`), { email: currentUser.email, roomId: roomId });

            document.getElementById('new-chat-modal').classList.remove('active');
            openChat(peerEmail, roomId);
        };

        function loadMyChats() {
            const myClean = currentUser.email.replace(/\./g, '_');
            const list = document.getElementById('chats-list');
            list.innerHTML = ''; // Очистить перед загрузкой

            // Добавить "Избранное"
            const favDiv = document.createElement('div');
            favDiv.className = `chat-item ${activeChatEmail === '_favorites_' ? 'active' : ''}`;
            favDiv.innerHTML = `<div class="avatar" style="background:#007aff;">⭐</div><div><b>Избранное</b></div>`;
            favDiv.onclick = () => openChat('_favorites_', `favorites_${currentUser.uid}`);
            list.appendChild(favDiv);

            onValue(ref(db, `users/${myClean}/contacts`), async (snapshot) => {
                // Очистить контакты, но сохранить "Избранное"
                Array.from(list.children).forEach(child => {
                    if (!child.classList.contains('chat-item') || child.querySelector('b').innerText !== 'Избранное') {
                        child.remove();
                    }
                });

                const contacts = snapshot.val();
                if (contacts) {
                    const contactPromises = Object.values(contacts).map(async (c) => {
                        const peerProfile = await getUserProfile(c.email);
                        const displayEmail = peerProfile?.username ? `@${peerProfile.username}` : c.email;
                        const avatarSrc = peerProfile?.avatarUrl;

                        const div = document.createElement('div');
                        div.className = `chat-item ${activeChatEmail === c.email ? 'active' : ''}`;
                        div.innerHTML = `
                            <div class="avatar" ${avatarSrc ? `style="background-image:url(${avatarSrc}); background-size:cover;"` : ''}>
                                ${!avatarSrc ? displayEmail[0].toUpperCase() : ''}
                            </div>
                            <div><b>${displayEmail}</b></div>
                        `;
                        div.onclick = () => openChat(c.email, c.roomId);
                        return div;
                    });
                    const contactElements = await Promise.all(contactPromises);
                    contactElements.forEach(el => list.appendChild(el));
                }
            });
        }

        window.openChat = async (email, roomId) => {
            activeChatEmail = email;
            activeRoomId = roomId;
            activePeerProfile = null; // Сброс профиля собеседника

            document.body.classList.add('chat-open');
            document.getElementById('input-bar').style.display = 'flex';
            
            // Обновление хедера чата
            const chatHeaderName = document.getElementById('chat-header-name');
            const chatHeaderAvatar = document.getElementById('chat-header-avatar');
            const chatHeaderAvatarImg = document.getElementById('chat-header-avatar-img');

            if (email === '_favorites_') {
                chatHeaderName.innerText = "Избранное";
                chatHeaderAvatar.style.backgroundImage = 'none';
                chatHeaderAvatar.innerText = '⭐';
                chatHeaderAvatarImg.style.display = 'none';
            } else {
                activePeerProfile = await getUserProfile(email);
                const displayName = activePeerProfile?.username ? `@${activePeerProfile.username}` : email;
                chatHeaderName.innerText = displayName;

                if (activePeerProfile?.avatarUrl) {
                    chatHeaderAvatar.innerText = '';
                    chatHeaderAvatarImg.src = activePeerProfile.avatarUrl;
                    chatHeaderAvatarImg.style.display = 'block';
                } else {
                    chatHeaderAvatar.style.backgroundImage = 'none';
                    chatHeaderAvatar.innerText = displayName[0].toUpperCase();
                    chatHeaderAvatarImg.style.display = 'none';
                }
            }
            loadMessages(roomId);
        };

        // --- СООБЩЕНИЯ (ТЕКСТ + ФАЙЛЫ + ГОЛОСОВЫЕ) ---
        window.sendTextMessage = () => {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if (text) pushMessage({ text });
            input.value = ''; input.style.height = 'auto';
        };

        window.handleFileUpload = async (file) => {
            if (!file) return;
            if (file.size > 10 * 1024 * 1024) return alert("Файл слишком большой (макс 10МБ)");
            
            const base64 = await fileToBase64(file);
            pushMessage({
                text: `[Медиа: ${file.type.split('/')[0]}]`,
                fileData: base64,
                fileType: file.type
            });
        };

        async function pushMessage(payload) {
            if (!activeRoomId) return;

            const chatKey = getChatKey(activeRoomId); // Получаем ключ для текущего чата

            const msgData = {
                sender: currentUser.email,
                timestamp: Date.now(),
                isEncrypted: true // Помечаем сообщение как зашифрованное
            };

            if (payload.text) {
                msgData.text = CryptoJS.AES.encrypt(payload.text, chatKey).toString();
            }
            if (payload.fileData) {
                msgData.fileData = CryptoJS.AES.encrypt(payload.fileData, chatKey).toString();
                msgData.fileType = payload.fileType;
            }

            const msgRef = push(ref(db, `messages/${activeRoomId}`));
            await set(msgRef, msgData);
        }

        function loadMessages(roomId) {
            const feed = document.getElementById('messages-feed');
            feed.innerHTML = '';
            
            // Отписаться от предыдущих прослушивателей, если есть
            // Внимание: onChildAdded не предоставляет прямого способа отписки от отдельного прослушивателя без сохранения ссылки.
            // Для простоты в этом примере, при переключении чата, просто очищаем feed и подписываемся заново.
            // В более сложном приложении нужно управлять отпиской (e.g., с помощью .off() на ссылке).

            onChildAdded(ref(db, `messages/${roomId}`), async (snap) => {
                if (activeRoomId !== roomId) return; // Убедиться, что это сообщение для активного чата

                const m = snap.val();
                let decryptedText = m.text;
                let decryptedFileData = m.fileData;

                if (m.isEncrypted) {
                    try {
                        const chatKey = getChatKey(roomId);
                        if (m.text) {
                            decryptedText = CryptoJS.AES.decrypt(m.text, chatKey).toString(CryptoJS.enc.Utf8);
                        }
                        if (m.fileData) {
                            decryptedFileData = CryptoJS.AES.decrypt(m.fileData, chatKey).toString(CryptoJS.enc.Utf8);
                        }
                    } catch (e) {
                        console.error("Ошибка дешифрования сообщения:", e);
                        decryptedText = "[Ошибка дешифрования]";
                        decryptedFileData = null;
                    }
                }

                const b = document.createElement('div');
                b.className = `bubble ${m.sender === currentUser.email ? 'out' : 'in'}`;

                if (decryptedFileData) {
                    if (m.fileType.startsWith('image/')) {
                        b.innerHTML = `<img src="${decryptedFileData}" alt="Image">`;
                    } else if (m.fileType.startsWith('video/')) {
                        b.innerHTML = `<video src="${decryptedFileData}" controls></video>`;
                    } else if (m.fileType.startsWith('audio/')) {
                        b.innerHTML = `<audio src="${decryptedFileData}" controls></audio>`;
                    } else {
                        b.innerText = decryptedText || `[${m.fileType.split('/')[1] || 'Файл'}]`;
                    }
                } else if (decryptedText) {
                    b.innerText = decryptedText;
                }
                
                feed.appendChild(b);
                feed.scrollTop = feed.scrollHeight;
            });
        }

        // --- Запись голосовых сообщений ---
        window.toggleAudioRecording = async () => {
            const micBtn = document.getElementById('audio-record-btn');
            const stopBtn = document.getElementById('audio-stop-btn');
            const timerDisplay = document.getElementById('recording-timer');
            const msgInput = document.getElementById('msg-input');

            if (mediaRecorder && mediaRecorder.state === 'recording') {
                // Остановить запись
                stopAudioRecording();
                micBtn.style.display = 'block';
                stopBtn.style.display = 'none';
                timerDisplay.style.display = 'none';
                msgInput.style.display = 'block'; // Показать текстовый инпут
            } else {
                // Начать запись
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    mediaRecorder.ondataavailable = event => {
                        audioChunks.push(event.data);
                    };
                    mediaRecorder.onstop = async () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        const base64Audio = await fileToBase64(audioBlob);
                        pushMessage({
                            text: "[Голосовое сообщение]",
                            fileData: base64Audio,
                            fileType: audioBlob.type
                        });
                        stream.getTracks().forEach(track => track.stop()); // Остановить треки
                        audioChunks = []; // Очистить после отправки
                        clearInterval(recordingTimerInterval); // Остановить таймер
                        timerDisplay.innerText = '00:00';
                        micBtn.style.display = 'block';
                        stopBtn.style.display = 'none';
                        timerDisplay.style.display = 'none';
                        msgInput.style.display = 'block'; // Показать текстовый инпут
                    };
                    mediaRecorder.start();
                    recordingStartTime = Date.now();
                    recordingTimerInterval = setInterval(() => {
                        const elapsed = Math.floor((Date.now() - recordingStartTime) / 1000);
                        const minutes = String(Math.floor(elapsed / 60)).padStart(2, '0');
                        const seconds = String(elapsed % 60).padStart(2, '0');
                        timerDisplay.innerText = `${minutes}:${seconds}`;
                    }, 1000);

                    micBtn.style.display = 'none';
                    stopBtn.style.display = 'block';
                    timerDisplay.style.display = 'inline';
                    msgInput.style.display = 'none'; // Скрыть текстовый инпут во время записи
                } catch (error) {
                    console.error("Ошибка при доступе к микрофону:", error);
                    alert("Не удалось получить доступ к микрофону. Проверьте разрешения.");
                }
            }
        };

        window.stopAudioRecording = () => {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
            }
        };

        // Вспомогательные функции
        function fileToBase64(file) {
            return new Promise((res, rej) => {
                const r = new FileReader();
                r.readAsDataURL(file);
                r.onload = () => res(r.result);
                r.onerror = e => rej(e);
            });
        }

        async function generateRoomId(e1, e2) {
            const s = [e1, e2].sort().join('|');
            const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
            return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('').slice(0,20);
        }

        window.logout = async () => {
            await auth.signOut();
            // Дополнительная очистка или редирект, если нужно
            window.location.reload();
        };
    </script>
    
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --bg-surface: #1a1a1c;
            --bg-input: #2c2c2e;
            --accent: #ff9f0a; /* Оранжевый акцент */
            --text-main: #ffffff;
            --text-muted: #8e8e93;
            --msg-in: #2c2c2e;
            --msg-out: #007aff; /* Синий для исходящих сообщений (как в ТГ) */
            --border: #38383a;
            --error: #ff3b30;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; }
        body { background: var(--bg-dark); color: var(--text-main); height: 100dvh; display: flex; overflow: hidden; }

        #login-screen {
            position: fixed; inset: 0; background: radial-gradient(circle, #2c2c2e 0%, #000 100%);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
        .login-card { width: 90%; max-width: 380px; background: var(--bg-surface); padding: 40px; border-radius: 30px; text-align: center; border: 1px solid var(--border); }
        .login-input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg-input); color: #fff; margin-bottom: 12px; outline: none; }
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--accent); color: #000; font-weight: 700; cursor: pointer; }
        .btn.secondary { background: #444; color: #fff; }

        .sidebar { width: 350px; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .chat-window { flex: 1; display: flex; flex-direction: column; background: #000; }
        
        .header { height: 70px; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; background: var(--bg-surface); border-bottom: 1px solid var(--border); }
        .chats-list { flex: 1; overflow-y: auto; }
        .chat-item { padding: 15px 20px; border-bottom: 1px solid #222; cursor: pointer; display: flex; align-items: center; gap: 12px; }
        .chat-item.active { background: #2c2c2e; }

        .avatar { 
            width: 48px; height: 48px; border-radius: 50%; background: var(--accent); color: #000; 
            display: flex; align-items: center; justify-content: center; font-weight: bold; flex-shrink: 0; 
            overflow: hidden; /* Важно для обрезки изображения */
        }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }

        .messages-feed { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .bubble { max-width: 75%; padding: 12px 16px; border-radius: 20px; font-size: 15px; line-height: 1.4; word-wrap: break-word; }
        .bubble.in { align-self: flex-start; background: var(--msg-in); border-bottom-left-radius: 4px; }
        .bubble.out { align-self: flex-end; background: var(--msg-out); color: #fff; border-bottom-right-radius: 4px; }
        .bubble img, .bubble video, .bubble audio { max-width: 100%; border-radius: 12px; display: block; margin-top: 5px; }

        .input-bar { padding: 15px; background: var(--bg-surface); display: flex; gap: 10px; align-items: center; }
        .input-bar textarea { flex: 1; background: var(--bg-input); border: none; border-radius: 20px; color: #fff; padding: 12px 18px; resize: none; outline: none; }
        
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .modal.active { display: flex; }
        .modal-content { background: var(--bg-surface); padding: 30px; border-radius: 25px; width: 90%; max-width: 400px; }

        #my-profile-btn {
            display: flex; align-items: center; gap: 12px; flex-grow: 1;
            padding: 15px 20px; border-bottom: 1px solid #222; cursor: pointer;
            background: var(--bg-surface); color: var(--text-main); text-align: left;
            border: none;
            width: 100%;
        }
        #my-profile-btn .avatar { background: #6c757d; } /* Серый для аватара профиля */
        #my-profile-btn b { font-weight: bold; }
        #my-profile-btn p { font-size: 12px; color: var(--text-muted); }

        .profile-edit-input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg-input); color: #fff; margin-bottom: 10px; outline: none; }
        .profile-avatar-upload-area {
            display: flex; flex-direction: column; align-items: center; margin-bottom: 20px;
        }
        .profile-avatar-upload-area .avatar { width: 100px; height: 100px; font-size: 40px; margin-bottom: 10px; }
        .profile-avatar-upload-area .avatar img { border-radius: 50%; }
        .profile-avatar-upload-area label {
            background: var(--accent); color: #000; padding: 8px 15px; border-radius: 8px; cursor: pointer;
            font-weight: 600; font-size: 14px;
        }

        @media (max-width: 768px) {
            .sidebar { width: 100%; }
            body.chat-open .sidebar { display: none; }
            .chat-window { display: none; }
            body.chat-open .chat-window { display: flex; position: fixed; inset: 0; }
        }
    </style>
</head>
<body>

    <!-- ВХОД -->
    <div id="login-screen">
        <div class="login-card">
            <div style="font-size: 50px; margin-bottom: 10px;">🐾</div>
            <h1>MeowMail Cloud</h1>
            <p style="color:var(--text-muted); margin-bottom:20px; font-size:14px;">Firebase Edition</p>
            <input type="email" id="email" class="login-input" placeholder="Email">
            <input type="password" id="password" class="login-input" placeholder="Пароль">
            <button class="btn" id="login-btn" onclick="authAction()">Войти / Регистрация</button>
            <div id="auth-error" style="color: var(--error); margin-top: 15px; font-size: 13px;"></div>
        </div>
    </div>

    <!-- МОДАЛЬНОЕ ОКНО НАСТРОЙКИ ПРОФИЛЯ ПРИ ПЕРВОМ ВХОДЕ -->
    <div class="modal" id="profile-setup-modal">
        <div class="modal-content">
            <h3 style="margin-bottom: 15px;">Создайте свой профиль</h3>
            <div class="profile-avatar-upload-area">
                <div class="avatar" style="background:#007aff;">?</div> <!-- Заглушка -->
                <label for="setup-avatar-file">Выбрать аватар</label>
                <input type="file" id="setup-avatar-file" style="display:none" accept="image/*">
            </div>
            <input type="text" id="setup-username" class="profile-edit-input" placeholder="@Юзернейм (только англ. буквы, цифры, _)">
            <textarea id="setup-description" class="profile-edit-input" placeholder="О себе (опционально)" rows="3"></textarea>
            <button class="btn" id="setup-profile-btn" onclick="setupOrUpdateProfile(true)">Создать профиль</button>
            <div id="setup-profile-error" style="color: var(--error); margin-top: 15px; font-size: 13px;"></div>
        </div>
    </div>

    <!-- САЙДБАР С ЧАТАМИ -->
    <div class="sidebar">
        <div class="header" style="justify-content: flex-start; gap: 15px;">
            <button id="my-profile-btn" onclick="showMyProfile()">
                <div class="avatar">
                    <img id="my-profile-avatar-display" src="" alt="" style="display:none;">
                    ?
                </div>
                <div>
                    <b id="my-profile-username-display">Мой Профиль</b>
                    <p>Нажмите для редактирования</p>
                </div>
            </button>
            <button onclick="document.getElementById('new-chat-modal').classList.add('active')" style="background:none; border:none; color:var(--accent); font-size:28px; cursor:pointer;" title="Новый чат">+
            </button>
            <button onclick="logout()" style="background:none; border:none; color:var(--text-muted); font-size:20px; cursor:pointer;" title="Выйти">🚪</button>
        </div>
        <div class="chats-list" id="chats-list">
            <!-- Здесь будут чаты и избранное -->
        </div>
    </div>

    <!-- ОКНО ЧАТА -->
    <div class="chat-window">
        <div class="header">
            <button onclick="document.body.classList.remove('chat-open')" style="background:none; border:none; color:var(--accent); font-size:20px; font-weight:bold; margin-right: 10px;" title="Назад">←</button>
            <div class="avatar" id="chat-header-avatar">
                <img id="chat-header-avatar-img" src="" alt="" style="display:none;">
                ?
            </div>
            <div id="chat-header-name" style="flex:1; margin-left:15px; font-weight:bold;">Выберите чат</div>
            <!-- Тут можно добавить кнопку информации о собеседнике -->
        </div>
        <div class="messages-feed" id="messages-feed"></div>
        <div class="input-bar" id="input-bar" style="display:none;">
            <input type="file" id="file-picker" style="display:none" accept="image/*,video/*,audio/*" onchange="handleFileUpload(this.files[0])">
            <button onclick="document.getElementById('file-picker').click()" style="background:none; border:none; font-size:22px; cursor:pointer;" title="Прикрепить файл">📎</button>
            <textarea id="msg-input" placeholder="Мяу..." rows="1" oninput="this.style.height='';this.style.height=this.scrollHeight+'px'" style="max-height: 100px;"></textarea>
            <button id="audio-record-btn" onclick="toggleAudioRecording()" style="background:none; border:none; font-size:22px; cursor:pointer;" title="Записать голосовое">🎤</button>
            <span id="recording-timer" style="display:none; color:var(--text-muted); font-size:14px;">00:00</span>
            <button id="audio-stop-btn" onclick="toggleAudioRecording()" style="display:none; background:var(--error); border:none; border-radius:12px; color:#fff; padding:8px 12px; font-weight:bold; cursor:pointer;" title="Остановить запись">Stop</button>
            <button class="btn" onclick="sendTextMessage()" style="width:50px; height:40px; padding:0; margin-left: auto;">🐾</button>
        </div>
    </div>

    <!-- МОДАЛЬНОЕ ОКНО НОВОГО ЧАТА (поиск по Email или @username) -->
    <div class="modal" id="new-chat-modal">
        <div class="modal-content">
            <h3 style="margin-bottom: 15px;">Новый чат</h3>
            <input type="text" id="new-chat-input" class="login-input" placeholder="Email или @юзернейм собеседника">
            <button class="btn" onclick="createNewChat()">Начать чат</button>
            <button class="btn secondary" style="margin-top:10px;" onclick="this.closest('.modal').classList.remove('active')">Отмена</button>
        </div>
    </div>

    <!-- МОДАЛЬНОЕ ОКНО РЕДАКТИРОВАНИЯ МОЕГО ПРОФИЛЯ -->
    <div class="modal" id="profile-modal">
        <div class="modal-content">
            <h3 style="margin-bottom: 15px;">Мой профиль</h3>
            <div class="profile-avatar-upload-area">
                <div class="avatar">
                    <img id="profile-avatar-display" src="" alt="Мой аватар">
                </div>
                <label for="profile-avatar-file">Изменить аватар</label>
                <input type="file" id="profile-avatar-file" style="display:none" accept="image/*">
            </div>
            <input type="text" id="profile-username" class="profile-edit-input" placeholder="@Юзернейм (только англ. буквы, цифры, _)">
            <textarea id="profile-description" class="profile-edit-input" placeholder="О себе (опционально)" rows="3"></textarea>
            <button class="btn" id="profile-save-btn" onclick="setupOrUpdateProfile(false)">Сохранить</button>
            <button class="btn secondary" style="margin-top:10px;" onclick="this.closest('.modal').classList.remove('active')">Отмена</button>
            <div id="profile-error" style="color: var(--error); margin-top: 15px; font-size: 13px;"></div>
        </div>
    </div>

</body>
                </html>
